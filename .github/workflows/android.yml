name: Android CI/CD
on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
jobs:
  build-debug:
    name: Build Debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Regenerate Gradle Wrapper
        run: |
          curl -sL -o /tmp/gradle-bin.zip https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip -q /tmp/gradle-bin.zip -d /tmp/gradle-install
          /tmp/gradle-install/gradle-9.3.1/bin/gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Regenerate Gradle Wrapper
        run: |
          curl -sL -o /tmp/gradle-bin.zip https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip -q /tmp/gradle-bin.zip -d /tmp/gradle-install
          /tmp/gradle-install/gradle-9.3.1/bin/gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          else
            echo "KEYSTORE_BASE64 is empty, skipping release build."
            exit 1
          fi
      - name: Verify Keystore Integrity
        run: |
          echo "File size in bytes:"
          stat -c%s keystore.jks || wc -c < keystore.jks
          echo "MD5 checksum (safe to log, does not reveal content):"
          md5sum keystore.jks
          echo "File type:"
          file keystore.jks
          keytool -list -v -keystore keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -alias "${{ secrets.KEY_ALIAS }}" 2>&1 | head -5
      - name: Build Release APK and AAB
        env:
          KEYSTORE_PATH: ../keystore.jks
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/app-release.aab
  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-bundle
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            app-release.aab
          generate_release_notes: true
