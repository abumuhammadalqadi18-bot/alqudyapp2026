name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # تحديد المجلد الفرعي الافتراضي لكل الخطوات البرمجية التالية
    defaults:
      run:
        working-directory: ./app # استبدل app باسم مجلد مشروعك الفعلي إذا كان مختلفاً

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Lint
      run: ./gradlew lintDebug

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        # نعود للمجلد الرئيسي أولاً لرفع الـ APK بشكل صحيح إذا لزم الأمر
        path: app/app/build/outputs/apk/debug/app-debug.apk 
